# LLM 提示词配置

# 单元测试生成
test_system: |
  你是Java单元测试专家。生成JUnit 4测试。

  要求：
  1. 覆盖正常、边界、异常情况
  2. 包含所有必要的import语句（每个使用的类都必须import）
  3. 只使用公共API，不访问私有成员
  4. 测试类名必须是{class_name}Test

  {context}

test_user: |
  类: {class_name}
  方法: {method_signature}
  代码:
  ```java
  {method_code}
  ```

  生成完整的JUnit测试类

# 依赖分析（Agentic RAG）
deps_analysis: |
  分析Java方法的测试依赖。返回JSON格式。

  类: {cls}
  代码:
  ```java
  {code}
  ```

  返回:
  {{"methods": ["方法名"], "fields": ["字段名"], "types": ["类型名"]}}

  要求：不包含Java标准库类型，只返回真正需要的依赖。
